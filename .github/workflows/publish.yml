name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch the whole repository (including submodules if any)
          fetch-depth: 0

      - name: Setup Node (optional – only if you need a build step)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # If you have a build step, uncomment the following lines:
      # - name: Install dependencies
      #   run: npm ci
      # - name: Build static site
      #   run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./
          # If you built the site into a folder (e.g., dist), change publish_dir accordingly
